# tmux configuration

# -- general -------------------------------------------------------------------

# Set prefix to Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reduce ESC delay for Neovim/Vim (0 may break arrow keys over slow connections; use 10 if issues)
set -sg escape-time 0

set -g default-terminal "tmux-256color"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g mode-keys vi
# set -g pane-border-lines heavy
# set -g pane-border-style 'fg=gray'
set -g pane-active-border-style 'reverse'
# set -g pane-border-status top

# -- status bar ----------------------------------------------------------------

# set -g status-style 'reverse'
# set -g status-left '[#S]  '
# set -g status-right '#{?client_prefix,[^A] ,}#T | #{battery_icon} #{battery_percentage} | %Y-%m-%d %H:%M '
set -g status-right '#{?client_prefix,[C-a] ,}#{battery_percentage} | %Y-%m-%d %H:%M '

# -- plugins -------------------------------------------------------------------

# Plugin manager (TPM)
set -g @plugin 'tmux-plugins/tpm'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Battery indicator
set -g @plugin 'tmux-plugins/tmux-battery'

# Clipboard integration
set -g @plugin 'tmux-plugins/tmux-yank'

# Resurrect options
set -g @resurrect-dir '~/.config/tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'

# Continuum options - auto save and restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Yank options
# Remain in copy mode after yanking (default 'copy-pipe-and-cancel' exits copy mode)
set -g @yank_action 'copy-pipe-no-clear'

# Initialize TPM (keep this line at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
